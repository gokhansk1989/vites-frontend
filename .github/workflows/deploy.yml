name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/motorya-frontend
            git pull origin main
            npm ci --legacy-peer-deps
            npm run build
            pm2 describe motorya-frontend > /dev/null 2>&1 \
              && pm2 restart motorya-frontend \
              || pm2 start node_modules/.bin/next --name motorya-frontend -- start -p 3001
            pm2 save
